<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - AgroMarket</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { margin-bottom: 20px; }
        h3 { color: #60bb46; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 25px; }

        button {
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #60bb46;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover { background: #4e9a39; }
        button:disabled { background: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>Confirm Your Purchase</h2>

    <div class="box">
        <h3 id="product-name">Loading Product...</h3>
        <p id="product-price">Rs. 0</p>

        <form id="esewa-form" action="https://rc-epay.esewa.com.np/api/epay/main/v2/form" method="POST">
            <input type="hidden" id="amount" name="amount">
            <input type="hidden" id="tax_amount" name="tax_amount" value="0">
            <input type="hidden" id="total_amount" name="total_amount">
            <input type="hidden" id="transaction_uuid" name="transaction_uuid">
            <input type="hidden" name="product_code" value="EPAYTEST">
            <input type="hidden" name="product_service_charge" value="0">
            <input type="hidden" name="product_delivery_charge" value="0">
            
            <input type="hidden" name="success_url" value="http://localhost/6thsemproo2/success.php">
            <input type="hidden" name="failure_url" value="http://localhost/6thsemproo2/fail.html">
            
            <input type="hidden" name="signed_field_names" value="total_amount,transaction_uuid,product_code">
            <input type="hidden" id="signature" name="signature">
        </form>

        <button id="pay-btn" onclick="payNow()">Pay with eSewa</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        window.onload = function() {
            // Pull the exact price from localStorage (e.g., 2200)
            const price = localStorage.getItem("price") || "100";
            const name = localStorage.getItem("productName") || "Generic Component";
            
            document.getElementById("product-name").innerText = name;
            document.getElementById("product-price").innerText = "Rs. " + price;
        };

        async function payNow() {
            const btn = document.getElementById("pay-btn");
            btn.disabled = true;
            btn.innerText = "Processing...";

            const price = localStorage.getItem("price") || "100";
            const transaction_uuid = "TXN-" + Date.now();

            // 1. Prepare data for store_order.php (Must match PHP $_POST keys)
            const formData = new FormData();
            formData.append('amount', price); 
            formData.append('transaction_uuid', transaction_uuid);

            try {
                // 2. Save the record to MySQL before leaving for eSewa
                const response = await fetch('store_order.php', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Database update failed");

                // 3. Set eSewa Hidden Inputs
                document.getElementById("amount").value = price;
                document.getElementById("total_amount").value = price;
                document.getElementById("transaction_uuid").value = transaction_uuid;

                // 4. Generate v2 Signature
                const secret = "8gBm/:&EnhH.1/q";
                const dataToSign = `total_amount=${price},transaction_uuid=${transaction_uuid},product_code=EPAYTEST`;
                const hash = CryptoJS.HmacSHA256(dataToSign, secret);
                const signature = CryptoJS.enc.Base64.stringify(hash);

                document.getElementById("signature").value = signature;

                // 5. Submit to eSewa
                document.getElementById("esewa-form").submit();

            } catch (error) {
                console.error(error);
                alert("Error: Database connection failed. Make sure store_order.php exists.");
                btn.disabled = false;
                btn.innerText = "Pay with eSewa";
            }
        }
    </script>
</body>
</html>
